<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Timeline PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a" />

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
}

header{
  padding:20px 16px 10px 16px;
}

h1{
  font-size:22px;
  margin:0;
}

.install{
  margin-top:10px;
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
}

.timeline{
  padding:30px 16px 60px 16px;
  max-width:600px;
  margin:auto;
}

.event{
  background:#1e293b;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  cursor:pointer;
  transition:transform .2s, background .2s;
}

.event:hover{
  transform:scale(1.02);
  background:#334155;
}

.date{
  font-size:18px;
  font-weight:bold;
  color:#38bdf8;
}

.desc{
  margin-top:10px;
  opacity:.9;
  display:none;
  font-size:15px;
  line-height:1.4;
}

.event.open .desc{
  display:block;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#38bdf8;
  display:inline-block;
  margin-right:8px;
}

footer{
  text-align:center;
  font-size:12px;
  opacity:.5;
  padding:20px;
}
</style>
</head>
<body>

<header>
<h1>Ma Timeline</h1>
<button id="installBtn" class="install" style="display:none">Installer l'application</button>
</header>

<div class="timeline" id="timeline"></div>

<footer>PWA Timeline</footer>

<script>

const events=[
{
 date:"2022",
 desc:"Début du projet et premières idées"
},
{
 date:"2023",
 desc:"Développement du prototype"
},
{
 date:"2024",
 desc:"Publication de la première version"
}
]

const timeline=document.getElementById("timeline")

events.forEach(e=>{

const el=document.createElement("div")
el.className="event"

el.innerHTML=`
<div class="date"><span class="dot"></span>${e.date}</div>
<div class="desc">${e.desc}</div>
`

el.addEventListener("click",()=>{

if(el.classList.contains("open")){
 el.classList.remove("open")
}else{
 document.querySelectorAll(".event").forEach(ev=>ev.classList.remove("open"))
 el.classList.add("open")
}

})

timeline.appendChild(el)

})


// PWA INSTALL
let deferredPrompt
const installBtn=document.getElementById("installBtn")

window.addEventListener("beforeinstallprompt",e=>{

 e.preventDefault()
 deferredPrompt=e
 installBtn.style.display="inline-block"

})

installBtn.addEventListener("click",async()=>{

 if(!deferredPrompt) return

 deferredPrompt.prompt()

 const {outcome}=await deferredPrompt.userChoice

 if(outcome==="accepted"){
  installBtn.style.display="none"
 }

 deferredPrompt=null

})


// SERVICE WORKER
if("serviceWorker" in navigator){

 navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
