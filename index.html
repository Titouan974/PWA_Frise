<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeline PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617" />

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#020617;
color:white;
}

header{
padding:20px;
}

h1{margin:0;font-size:22px}

.timeline{
position:relative;
max-width:700px;
margin:auto;
padding:40px 0;
}

.timeline::before{
content:"";
position:absolute;
left:30px;
top:0;
bottom:0;
width:3px;
background:linear-gradient(#38bdf8,#a78bfa);
box-shadow:0 0 10px #38bdf8;
}

.event{
position:relative;
margin:30px 0;
padding-left:70px;
cursor:pointer;
}

.node{
position:absolute;
left:22px;
top:5px;
width:16px;
height:16px;
border-radius:50%;
background:linear-gradient(135deg,#38bdf8,#a78bfa);
box-shadow:0 0 10px #38bdf8;
}

.period{
font-weight:700;
font-size:16px;
color:#38bdf8;
}

.title{
font-size:17px;
margin-top:2px;
font-weight:600;
}

.content{
margin-top:12px;
background:#1e293b;
border-radius:14px;
padding:16px;
display:none;
line-height:1.5;
font-size:14px;
white-space:pre-line;
}

.event.open .content{
display:block;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(-5px)}
to{opacity:1;transform:translateY(0)}
}

footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:.5;
}
</style>
</head>
<body>

<header>
<h1>Frise du Design</h1>
</header>

<div class="timeline" id="timeline"></div>

<footer>PWA Timeline</footer>

<script>

const events=[
{
period:"1860–1910",
title:"Arts & Crafts",
content:`Idée principale et contexte :
Le mouvement Arts & Crafts apparaît en Angleterre face à l’industrialisation. La production de masse entraîne des objets uniformes, peu durables et sans âme.

Valeurs et caractéristiques :
• Matériaux naturels
• Formes simples
• Durabilité

Designer clé :
William Morris`
},
{
period:"1890–1910",
title:"Art nouveau",
content:`Idée principale et contexte :
Rejet des styles historiques et inspiration de la nature.

Valeurs :
• Lignes sinueuses
• Motifs végétaux

Designer :
Hector Guimard`
},
{
period:"1919–1933",
title:"Bauhaus",
content:`Idée principale :
Unifier art, artisanat et industrie.

Valeurs :
• Forme suit fonction
• Minimalisme

Designers :
Marcel Breuer, Mies van der Rohe`
}
]

const timeline=document.getElementById("timeline")

events.forEach(e=>{

const el=document.createElement("div")
el.className="event"

el.innerHTML=`
<div class="node"></div>
<div class="period">${e.period}</div>
<div class="title">${e.title}</div>
<div class="content">${e.content}</div>
`

el.addEventListener("click",()=>{

if(el.classList.contains("open")){
el.classList.remove("open")
}else{

document.querySelectorAll(".event").forEach(ev=>ev.classList.remove("open"))

el.classList.add("open")
}

})

timeline.appendChild(el)

})

// service worker
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
