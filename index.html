<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Timeline PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617" />

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

header{
padding:20px 18px 10px 18px;
}

h1{
margin:0;
font-size:22px;
letter-spacing:0.5px;
}

.install{
margin-top:12px;
padding:10px 16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#38bdf8,#a78bfa);
color:#020617;
font-weight:700;
}

.timeline{
position:relative;
padding:40px 0 80px 0;
width:100%;
max-width:520px;
margin:auto;
}

/* central glowing line */
.timeline::before{
content:"";
position:absolute;
left:50%;
top:0;
bottom:0;
width:3px;
background:linear-gradient(#38bdf8,#a78bfa);
transform:translateX(-50%);
box-shadow:0 0 15px #38bdf8;
}

.event{
position:relative;
width:50%;
padding:10px 16px;
margin:35px 0;
}

.event.left{
left:0;
text-align:right;
}

.event.right{
left:50%;
}

.node{
width:18px;
height:18px;
border-radius:50%;
background:linear-gradient(135deg,#38bdf8,#a78bfa);
position:absolute;
top:8px;
box-shadow:0 0 12px #38bdf8;
}

.event.left .node{
right:-9px;
}

.event.right .node{
left:-9px;
}

.date{
font-weight:700;
font-size:16px;
opacity:.9;
}

.card{
margin-top:10px;
background:#1e293b;
border-radius:16px;
padding:14px;
font-size:14px;
line-height:1.4;
display:none;
box-shadow:0 15px 30px rgba(0,0,0,.45);
}

.event.open .card{
display:block;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(-5px)}
to{opacity:1;transform:translateY(0)}
}

/* MOBILE IMPROVEMENT */
@media(max-width:600px){

.timeline::before{
left:26px;
}

.event{
width:100%;
padding-left:60px;
margin:28px 0;
}

.event.left,
.event.right{
left:0;
text-align:left;
}

.node{
left:18px !important;
right:auto;
}

}

footer{
text-align:center;
font-size:12px;
opacity:.5;
padding:25px;
}

</style>
</head>
<body>

<header>
<h1>Ma Frise Chronologique</h1>
<button id="installBtn" class="install" style="display:none">Installer l'app</button>
</header>

<div class="timeline" id="timeline"></div>

<footer>PWA Timeline</footer>

<script>

const events=[
{
 date:"2018",
 desc:"Première idée du projet et recherches initiales."
},
{
 date:"2020",
 desc:"Début du développement et premiers prototypes."
},
{
 date:"2022",
 desc:"Amélioration de l'application et nouvelles fonctionnalités."
},
{
 date:"2024",
 desc:"Publication de la première version publique."
}
]

const timeline=document.getElementById("timeline")

// build timeline

events.forEach((e,i)=>{

const side=i%2===0?"left":"right"

const el=document.createElement("div")
el.className=`event ${side}`

el.innerHTML=`
<div class="node"></div>
<div class="date">${e.date}</div>
<div class="card">${e.desc}</div>
`

el.addEventListener("click",()=>{

if(el.classList.contains("open")){
el.classList.remove("open")
}else{

document.querySelectorAll(".event").forEach(ev=>ev.classList.remove("open"))

el.classList.add("open")
}

})

timeline.appendChild(el)

})


// PWA INSTALL

let deferredPrompt
const installBtn=document.getElementById("installBtn")

window.addEventListener("beforeinstallprompt",e=>{

 e.preventDefault()
 deferredPrompt=e
 installBtn.style.display="inline-block"

})

installBtn.addEventListener("click",async()=>{

 if(!deferredPrompt) return

 deferredPrompt.prompt()

 const {outcome}=await deferredPrompt.userChoice

 if(outcome==="accepted"){
 installBtn.style.display="none"
 }

 deferredPrompt=null

})


// service worker
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
