<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeline PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617" />

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#020617;
color:white;
}

header{padding:20px}
h1{margin:0;font-size:22px}

.timeline{
position:relative;
max-width:700px;
margin:auto;
padding:40px 0;
}

.timeline::before{
content:"";
position:absolute;
left:30px;
top:0;
bottom:0;
width:3px;
background:linear-gradient(#38bdf8,#a78bfa);
box-shadow:0 0 10px #38bdf8;
}

.event{
position:relative;
margin:30px 0;
padding-left:70px;
cursor:pointer;
}

.node{
position:absolute;
left:22px;
top:5px;
width:16px;
height:16px;
border-radius:50%;
background:linear-gradient(135deg,#38bdf8,#a78bfa);
box-shadow:0 0 10px #38bdf8;
}

.period{
font-weight:700;
font-size:16px;
color:#38bdf8;
}

.title{
font-size:17px;
margin-top:2px;
font-weight:600;
}

.content{
margin-top:12px;
background:#1e293b;
border-radius:14px;
padding:18px;
display:none;
line-height:1.6;
font-size:14px;
}

/* Styled content */
.content h3{
margin:18px 0 8px 0;
font-size:15px;
color:#a78bfa;
}

.content p{
margin:8px 0;
opacity:.9;
}

.content ul{
padding-left:18px;
margin:8px 0;
}

.content li{
margin:6px 0;
}

.content .block{
margin-top:12px;
padding-top:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

.event.open .content{
display:block;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(-5px)}
to{opacity:1;transform:translateY(0)}
}

footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:.5;
}
</style>
</head>
<body>

<header>
<h1>Frise du Design</h1>
</header>

<div class="timeline" id="timeline"></div>

<footer>PWA Timeline</footer>

<script>

// helper to format rich text
function formatContent(text){

// sections
text = text.replace(/Idée principale et contexte :/g, '<h3>Idée principale et contexte</h3>')
text = text.replace(/Valeurs et caractéristiques :/g, '<h3>Valeurs et caractéristiques</h3>')
text = text.replace(/Designer clé et objets emblématiques :/g, '<h3>Designer & objets</h3>')
text = text.replace(/Designer clé :/g, '<h3>Designer clé</h3>')
text = text.replace(/Designers clés et objets emblématiques :/g, '<h3>Designers & objets</h3>')

// bullets → list
text = text.replace(/• (.*)/g, '<li>$1</li>')
text = text.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')

// paragraphs
text = text.split('\n').map(line=>{
 if(line.trim().startsWith('<h3>') || line.trim().startsWith('<ul>')) return line
 if(line.trim()==='') return ''
 return `<p>${line}</p>`
}).join('')

return text
}

const events=[
{
period:"1860–1910",
title:"Arts & Crafts",
content:`Idée principale et contexte :
Le mouvement Arts & Crafts apparaît en Angleterre face à l’industrialisation.

Valeurs et caractéristiques :
 • Matériaux naturels
 • Formes simples
 • Durabilité

Designer clé :
William Morris`
}
]

const timeline=document.getElementById("timeline")

events.forEach(e=>{

const el=document.createElement("div")
el.className="event"

el.innerHTML=`
<div class="node"></div>
<div class="period">${e.period}</div>
<div class="title">${e.title}</div>
<div class="content">${formatContent(e.content)}</div>
`

el.addEventListener("click",()=>{

if(el.classList.contains("open")){
el.classList.remove("open")
}else{

document.querySelectorAll(".event").forEach(ev=>ev.classList.remove("open"))

el.classList.add("open")
}

})

timeline.appendChild(el)

})

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
